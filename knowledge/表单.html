<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青春修炼手册</title>
    <!-- 没有CSS，只靠浏览器默认样式 + 纯HTML元素，完全复现图片上的每一个文字和控件 -->
</head>
<body>
    <!-- 整个内容直接对应原图结构，不使用任何样式类或布局技巧，纯HTML标记 -->
    <h1>青春不常在，抓紧谈恋爱</h1>

    <!-- 性别 -->
    <div>
        <strong>性别：</strong>
        <input type="radio" name="gender" value="男"> 男 
        <input type="radio" name="gender" value="女"> 女
    </div>
    <br>

    <!-- 生日 -->
    <div>
        <strong>生日：</strong>
        <select>
            <option selected disabled>---请选择年份---</option>
            <option>1990</option><option>1991</option><option>1992</option><option>1993</option><option>1994</option>
            <option>1995</option><option>1996</option><option>1997</option><option>1998</option><option>1999</option>
            <option>2000</option><option>2001</option><option>2002</option><option>2003</option><option>2004</option>
            <option>2005</option><option>2006</option><option>2007</option><option>2008</option><option>2009</option>
            <option>20010</option><option>2011</option><option>2012</option><option>2013</option><option>2014</option>
            <option>2015</option><option>2016</option><option>2017</option><option>2018</option><option>2019</option>
            <option>2020</option>
        </select>
        <select>
            <option selected disabled>---请选择月份---</option>
            <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option>
            <option>7</option><option>8</option><option>9</option><option>10</option><option>11</option><option>12</option>
        </select>
        <select>
            <option selected disabled>---请选择日---</option>
            <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>7</option><option>8</option><option>9</option><option>10</option>
            <option>11</option><option>12</option><option>13</option><option>14</option><option>15</option><option>16</option><option>17</option><option>18</option><option>19</option><option>20</option>
            <option>21</option><option>22</option><option>23</option><option>24</option><option>25</option><option>26</option><option>27</option><option>28</option><option>29</option><option>30</option>
            <option>31</option>
        </select>
    </div>
    <br>

    <!-- 所在地区 -->
    <div>
        <strong>所在地区：</strong>
        <input type="text" placeholder="请输入地区名称">
    </div>
    <br>

    <!-- 已婚状况 -->
    <div>
        <strong>已婚状况：</strong>
        <input type="radio" name="marital" value="已婚"> 已婚
        <input type="radio" name="marital" value="未婚"> 未婚
        <input type="radio" name="marital" value="离婚"> 离婚
    </div>
    <br>

    <!-- 学历 -->
    <div>
        <strong>学历：</strong>
        <input type="text" placeholder="如：本科、硕士等">
    </div>
    <br>

    <!-- 喜欢的类型（复选框） -->
    <div>
        <strong>喜欢的类型：</strong>
        <input type="checkbox" name="type1" value="妩媚"> 妩媚的
        <input type="checkbox" name="type2" value="可爱"> 可爱的
        <input type="checkbox" name="type3" value="小鲜肉"> 小鲜肉
        <input type="checkbox" name="type4" value="老腊肉"> 老腊肉
        <input type="checkbox" name="type5" value="都喜欢"> 都喜欢
    </div>
    <br>

    <!-- 个人介绍 -->
    <div>
        <strong>个人介绍：</strong>
        <textarea rows="4" cols="50" placeholder="写点介绍..."></textarea>
    </div>
    <br>

    <!-- 免费注册按钮（纯按钮，无样式） -->
    <button type="button"><strong>免费注册</strong></button>
    <br><br>

    <!-- 我同意注册条款（复选框） -->
    <div>
        <input type="checkbox" name="agree" id="agree"> 
        <label for="agree">我同意注册条款和会员加入标准</label>
    </div>
    <br>

    <!-- 我是会员，立即登录（超链接） -->
    <div>
        <a href=" ">我是会员，立即登录</a >
    </div>
    <br>

    <!-- 我承诺区域（纯文字 + 特殊符号模拟圆点，但完全符合原图文字） -->
    <div>
        <strong>我承诺</strong><br>
        <ul>
            <li>年满18岁、满20减2</li>
            <li>抱着严肃的态度</li>
            <li>真诚寻找另一半</li>
        </ul>
    </div>

</body>
</html>
